version: "3.9"

services:
  app:
    build: .
    container_name: ujian
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      OCTANE_SERVER: frankenphp

      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: ujian
      DB_USERNAME: root
      DB_PASSWORD: ""

networks:
  ujian-net:
    driver: bridge
